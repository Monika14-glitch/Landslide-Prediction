<!DOCTYPE html>

<html>
<head>

<title>Landslide Monitoring & Warning System</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
text-align:center;
}

h1{
margin-top:20px;
font-size:35px;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
margin-top:20px;
}

.card{
background:white;
color:black;
width:180px;
margin:10px;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.value{
font-size:26px;
font-weight:bold;
color:#0077ff;
}

.status{
font-size:28px;
margin-top:20px;
padding:10px;
border-radius:10px;
display:inline-block;
}

.normal{
background:#2ecc71;
}

.mild{
background:#f39c12;
}

.severe{
background:#e74c3c;
}

.section{
background:white;
color:black;
width:80%;
margin:auto;
margin-top:20px;
padding:20px;
border-radius:10px;
text-align:left;
}

</style>

</head>

<body>

<h1>🌍 Landslide Monitoring System</h1>

<div class="container">

<div class="card">
Temperature
<div id="temp" class="value">--</div>
</div>

<div class="card">
Humidity
<div id="hum" class="value">--</div>
</div>

<div class="card">
Moisture
<div id="moist" class="value">--</div>
</div>

<div class="card">
Vibration
<div id="vib" class="value">--</div>
</div>

<div class="card">
Gyro Movement
<div id="gyro" class="value">--</div>
</div>

</div>

<div id="prediction" class="status">Loading...</div>

<div class="section">
<h2>Possible Reasons</h2>
<ul id="reasons"></ul>
</div>

<div class="section">
<h2>Emergency Suggestions</h2>
<ul id="suggestions"></ul>
</div>

<script>

// ThingSpeak channel
const url="https://api.thingspeak.com/channels/565129/feeds/last.json";

async function updateData(){

try{

let response=await fetch(url);
let data=await response.json();

// Convert fields
let temperature=parseFloat(data.field1);
let humidity=parseFloat(data.field2);
let moisture=parseFloat(data.field3);
let vibration=parseInt(data.field4);
let gyro=parseFloat(data.field5);

// Display values
document.getElementById("temp").innerText=temperature+" °C";
document.getElementById("hum").innerText=humidity+" %";
document.getElementById("moist").innerText=moisture;
document.getElementById("vib").innerText=vibration;
document.getElementById("gyro").innerText=gyro;

let status="Normal";
let cls="normal";

let reasons=[];
let suggestions=[];

if(vibration==0 && gyro>0.9){
status="Normal";
cls="normal";

reasons.push("Ground conditions stable");
reasons.push("No abnormal vibrations detected");

suggestions.push("Continue monitoring sensors");
suggestions.push("No immediate danger");
}

if(vibration==1 || gyro<0.9){

status="Moderate Landslide Risk";
cls="mild";

reasons.push("Ground vibration detected");
reasons.push("Possible soil movement");
reasons.push("Increased moisture level");

suggestions.push("Inspect nearby slopes");
suggestions.push("Alert local authorities");
suggestions.push("Avoid heavy vehicles near slope");
}

if(vibration==1 && gyro<0.75){

status="Severe Landslide Risk";
cls="severe";

reasons.push("Strong ground vibration");
reasons.push("Significant slope movement");
reasons.push("Possible soil collapse");

suggestions.push("Evacuate nearby area immediately");
suggestions.push("Alert emergency services");
suggestions.push("Block roads near landslide zone");
suggestions.push("Move to safe higher ground");
}

let box=document.getElementById("prediction");
box.innerText=status;
box.className="status "+cls;

let r=document.getElementById("reasons");
let s=document.getElementById("suggestions");

r.innerHTML="";
s.innerHTML="";

reasons.forEach(x=>{
let li=document.createElement("li");
li.innerText=x;
r.appendChild(li);
});

suggestions.forEach(x=>{
let li=document.createElement("li");
li.innerText=x;
s.appendChild(li);
});

}catch(e){
console.log(e);
}

}

// ThingSpeak free limit = 15 seconds
setInterval(updateData,15000);

</script>

</body>
</html>
